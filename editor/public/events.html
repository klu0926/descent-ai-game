<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Editor</title>
    <link rel="stylesheet" href="./style.css?v=20260420a">
    <script defer src="./events.js?v=20260420a"></script>
    <script>
    (function () {
        const stream = new EventSource('/__live_reload');
        stream.addEventListener('reload', function () {
            window.location.reload();
        });
    })();
    </script>
</head>
<body>
<div class="wrap">
    <div class="panel panel-top-nav">
        <nav class="top-nav" aria-label="Editor sections">
            <a class="top-nav-link" href="/player.html">Player</a>
            <a class="top-nav-link" href="/enemy.html">Enemy</a>
            <a class="top-nav-link" href="/level.html">Level</a>
            <a class="top-nav-link" href="/backgrounds.html">Background</a>
            <a class="top-nav-link" href="/items.html">Items</a>
            <a class="top-nav-link is-active" href="/events.html">Events</a>
            <a class="top-nav-link" href="/skills.html">Skills</a>
        </nav>
    </div>

    <div class="panel">
        <h1>Event Editor</h1>
        <div class="muted">Core events are locked. You can add, edit, and delete custom events.</div>
        <div id="status" class="muted mt8"></div>
    </div>

    <div class="panel">
        <h1 class="section-title">Add New Event</h1>
        <div class="stats-row mt8">
            <div class="stats-field">
                <span class="add-col-label">name</span>
                <input id="new-name" placeholder="MY_CUSTOM_EVENT">
            </div>
            <div class="stats-field">
                <span class="add-col-label">scope</span>
                <select id="new-scope">
                    <option value="custom">custom</option>
                    <option value="combat">combat</option>
                    <option value="game">game</option>
                </select>
            </div>
        </div>
        <div class="mt8">
            <span class="add-col-label">description</span>
            <textarea id="new-description" class="enemy-description" placeholder="What this event is used for"></textarea>
        </div>
        <div class="mt8">
            <button id="add-btn" type="button">Add Event</button>
        </div>
    </div>

    <div class="panel panel-flex-col">
        <div class="panel-title-row">
            <h1 class="section-title">All Events</h1>
            <div class="row">
                <select id="event-filter" class="panel-collapse-btn" aria-label="Filter events">
                    <option value="all">All</option>
                    <option value="core">Core</option>
                    <option value="non_core">Non-core</option>
                </select>
                <button id="open-all-btn" type="button" class="panel-collapse-btn">Open All</button>
                <button id="close-all-btn" type="button" class="panel-collapse-btn">Close All</button>
            </div>
        </div>
        <div id="event-list" class="enemy-panel-list"></div>
    </div>
</div>
</body>
</html>
